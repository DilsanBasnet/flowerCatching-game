<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 🌹 FlowerCatcher-Game (by Dilsan Basnet) | Macondo Project</title>
</head>
<body>

    <nav>
        <h2>Catch Flowers</h2>
    </nav>

    <div id="main-wrapper">
        <div id="game-container">
            <div id="start-screen" class="overlay">
                <h1>Welcome to FlowerCatcher</h1>
                <p>Catch Flowers 🌹</p>
                <button id="start-btn">Start Game</button>
            </div>
            <div id="ui-layer">
                <div class="stats-box">Score: <span id="score"> 0 </span></div>
                <div class="stats-box">
                    Health:
                    <div id="happiness-bar-container">
                        <div id="happiness-fill"></div>
                    </div>
                </div>
            </div>
            <div id="player"></div>
            <div id="game-over" class="overlay" ></div>
        </div>

    </div>

    
</body>
</html>
